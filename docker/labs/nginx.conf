server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;
  autoindex off;
  server_tokens off;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location ^~ /api/ {
    return 404;
  }

  location ^~ /admin/ {
    return 404;
  }

  location ~ ^/previews/(.*)$ {
    add_header Cache-Control "no-store" always;
    try_files /labs/previews/$1 /labs/previews/$1/index.html =404;
  }

  location ~ ^/projects/([^/]+)/$ {
    try_files /labs/projects/$1/current/index.html =404;
  }

  location ~ ^/projects/([^/]+)/(.*)$ {
    try_files /labs/projects/$1/current/$2 =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
