name: yourblog-test

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: blog_test
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog_test"]
      interval: 1s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
