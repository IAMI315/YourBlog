name: yourblog-dev

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: blog_dev
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
    ports:
      - "${DEV_DB_PORT:-5434}:5432"
    volumes:
      - dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog_dev"]
      interval: 5s
      timeout: 5s
      retries: 12

  labs:
    image: nginx:1.29-alpine
    restart: unless-stopped
    volumes:
      - ./docker/labs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/web-projects:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 12

  proxy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      labs:
        condition: service_healthy
    environment:
      BLOG_HOST: blog.localhost
      LABS_HOST: labs.localhost
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${DEV_HTTP_PORT:-32124}:80"
    volumes:
      - ./docker/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  dev-postgres-data:
